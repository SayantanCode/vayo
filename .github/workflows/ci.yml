name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # packages/db-mongo's own tests exercise a real MongoDB instance rather
    # than mocking the driver (see CONTRIBUTING.md) — everything else
    # (packages/server included) runs against an in-memory fake adapter and
    # doesn't need this.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # A real ESLint rule now (`.eslintrc.cjs`'s `no-restricted-imports`
      # override) formalizes CLAUDE.md's non-negotiable #5 — schema-engine,
      # openapi-compiler, db-mongo, and ui must never import Express/any
      # web-framework types.
      - name: Lint
        run: pnpm lint

      # Kept alongside the ESLint rule above as a second, dependency-free
      # check of the exact same boundary (CONTRIBUTING.md) — cheap enough
      # that the redundancy costs nothing.
      - name: Check package boundaries
        run: pnpm check:boundaries

      # Root `pnpm build` only runs `tsc -b` (project references) — it does
      # NOT run @vayo/ui's own `vite build`, which is what actually produces
      # dist-app/, the built SPA bundle @vayo/server serves at runtime.
      # Without this, packages/server's "static UI serving" tests fail
      # against a dist-app/ that was never built.
      - name: Build @vayo/ui's SPA bundle (dist-app/)
        run: pnpm --filter @vayo/ui build

      - name: Test
        run: pnpm test
        env:
          VAYO_TEST_MONGO_URI: mongodb://localhost:27017/vayo_test_dbmongo
